name: Build Application

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build DMG
        run: ./gradlew :app:packageReleaseDmg

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v7
        with:
          name: animo-macos-dmg
          path: animo-app/build/compose/binaries/main-release/**/*.dmg

  build-windows:
    name: Windows (.msi)
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build MSI
        run: ./gradlew :app:packageReleaseMsi

      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v7
        with:
          name: animo-windows-msi
          path: animo-app/build/compose/binaries/main-release/**/*.msi

  build-linux:
    name: Linux (.deb & .rpm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg rpm

      - name: Build DEB & RPM
        run: ./gradlew :app:packageReleaseDeb :app:packageReleaseRpm

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v7
        with:
          name: animo-linux-deb
          path: animo-app/build/compose/binaries/main-release/**/*.deb

      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v7
        with:
          name: animo-linux-rpm
          path: animo-app/build/compose/binaries/main-release/**/*.rpm
