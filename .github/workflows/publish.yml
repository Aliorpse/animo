name: Build Compose Desktop Distributions

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build DMG
        run: ./gradlew :app:packageReleaseDmg

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: animo-macos-dmg
          path: animo-app/build/compose/binaries/main-release/**/*.dmg

  build-windows:
    name: Windows (.msi)
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build MSI
        run: ./gradlew :app:packageReleaseMsi

      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: animo-windows-msi
          path: animo-app/build/compose/binaries/main-release/**/*.msi

  build-linux:
    name: Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install DPkG tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg

      - name: Build DEB
        run: ./gradlew :app:packageReleaseDeb

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: animo-ubuntu-deb
          path: animo-app/build/compose/binaries/main-release/**/*.deb
